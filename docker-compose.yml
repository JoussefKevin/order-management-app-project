version: '3.8'

services:

  # ── Base de datos PostgreSQL ──────────────────
  postgres:
    image: postgres:16-alpine
    container_name: order-db
    environment:
      POSTGRES_DB:       postgres
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: kevin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  # ── Backend Spring Boot ───────────────────────
  backend:
    build:
      context: ../orderManagementAPI
      dockerfile: Dockerfile
    container_name: order-backend
    environment:
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_NAME:      postgres
      DB_USER:      postgres
      DB_PASS:      kevin
      SERVER_PORT:  8080
      SECRET_KEY:   59d31c1c6f4aa3c2813d0e163d2feafcdc5f859996b20550aab745edbcf259ac
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - order-network

  # ── Frontend Angular ──────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - order-network

volumes:
  postgres_data:

networks:
  order-network:
    driver: bridge

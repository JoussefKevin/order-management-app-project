<header class="header">
  <div class="header-left">
    <span class="header-brand">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955
             11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824
             10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
      </svg>
      Order Management
    </span>
  </div>

  <div class="header-right">
    <div class="user-info">
      <div class="user-avatar">
        {{ currentUser()?.sub?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="user-details">
        <span class="user-email">{{ currentUser()?.sub }}</span>
        <span class="user-role">{{ userRole() }}</span>
      </div>
    </div>

    <button class="btn-logout" (click)="logout()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3
             0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Cerrar sesión
    </button>
  </div>
</header>

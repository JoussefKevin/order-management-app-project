<div class="table-wrapper">
  <table class="tabla">
    <thead>
      <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      @for (producto of productos(); track producto.id) {
        <tr>
          <td>{{ producto.id }}</td>
          <td class="td-nombre">{{ producto.name }}</td>
          <td>S/ {{ producto.price | number:'1.2-2' }}</td>
          <td>
            <span class="badge" [attr.data-status]="producto.stock | productoSemaforo">
              {{ producto.stock }}
            </span>
          </td>
          <td class="td-desc">{{ producto.description }}</td>
          <td>
            <div class="actions">
              <a [routerLink]="['editar', producto.id]" class="btn-edit">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5
                       m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </a>
              <button class="btn-delete" (click)="onEliminar(producto.id)">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5
                       7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
